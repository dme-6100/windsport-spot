<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vind-spotter</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100vw; }

    
    /* Panel */
    .panel {
      position: absolute;
      left: 10px;
      right: 10px;  /* <-- gjør at den kan fylle pent i bredden */
      bottom: calc(10px + env(safe-area-inset-bottom)); /* <-- safe area */
      z-index: 3000;

      background: rgba(255,255,255,0.93);
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.20);

      max-width: 720px; /* <-- beholder maksbredden */
      margin: 0 auto;   /* <-- sentrerer */
      font-family: system-ui, Arial, sans-serif;
    }
      /* Gjør "Tidspunkt" (h3) lik timeLabel */
    .panel h3 {
      margin: 0 0 6px 0;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    /* Aktuell tid – match h3 */
    #timeLabel {
      margin: 0 0 10px 0;  /* litt luft før slider */
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      opacity: 1;
    }

    /* Viktig: divIcon uten default bakgrunn */
    .wind-arrow-icon,
    .wind-speed-icon,
    .spot-name-icon {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* ✅ Vindhastighet UTEN hvit firkant:
       - ingen background
       - ingen border
       - litt text-shadow for lesbarhet */
    .wind-speed-label {
      font-family: system-ui, Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      color: #111;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      margin: 0 !important;
      box-shadow: none !important;
      white-space: nowrap;
      text-shadow: 0 0 2px rgba(255,255,255,0.95), 0 0 6px rgba(255,255,255,0.75);
    }

    /* ✅ Spot-navn rett over sirkelen */
    .spot-name-label {
      font-family: system-ui, Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      color: #111;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      margin: 0 !important;
      box-shadow: none !important;
      white-space: nowrap;
      text-shadow: 0 0 2px rgba(255,255,255,0.95), 0 0 6px rgba(255,255,255,0.75);
    }

  .weather-badge {
    font-family: system-ui, Arial, sans-serif;
    font-size: 34px;
    line-height: 34px;
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;

    white-space: nowrap;

    /* samme lesbarhet som du bruker ellers */
    text-shadow: 0 0 2px rgba(255,255,255,0.95), 0 0 6px rgba(255,255,255,0.75);
  }


.alarm-badge {
  font-family: system-ui, Arial, sans-serif;
  font-size: 14px;
  font-weight: 900;
  color: #277556;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  white-space: nowrap;
   /* litt lesbarhet over kartet */
    text-shadow: 0 0 2px rgba(255,255,255,0.95), 0 0 6px rgba(255,255,255,0.75);
  }

  /* sørg for at Leaflet-divIcon ikke får bakgrunn */
  .alarm-icon {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

    /* ===== Dagsskille under slider (pen og uten overlap) ===== */

.slider-wrap {
  position: relative;
  width: 100%;
}

#timeSlider {
  width: 100%;
  position: relative;
  z-index: 5;
}

.day-track {
  position: relative;
  width: 100%;   /* viktig: samme bredde som slideren */
  height: 22px;
  margin-top: 6px;
  margin-bottom: 2px;
}


.day-tick {
  position: absolute;
  top: 0;
  width: 3px;
  height: 14px;
  background: rgba(0,0,0,0.35);
}

.day-label {
  position: absolute;
  top: 10px;
  transform: translateX(-50%);
  font-size: 14px;
  color: rgba(0,0,0,0.65);
  white-space: nowrap;
}

/* Gjør første dag litt tydeligere */
.day-tick.first {
  background: rgba(0,0,0,0.55);
  height: 16px;
}

.day-label.first {
  color: rgba(0,0,0,0.85);
  font-size: 14px;
  font-weight: 700;
}


/* Aktuell dato/tid (under slider) – midtstilt + mer luft over */
#timeLabel {
  text-align: center;
  font-size: 18px;      /* juster etter smak */
  font-weight: 700;
  opacity: 1;

  margin-top: 12px;     /* <-- mer luft over */
  margin-bottom: 2px;   /* valgfritt: litt luft under */
}

/* Dag-skiller skal ikke fange mus/touch – slideren skal få alt */
#dayTrack,

#dayTrack * {
  pointer-events: none;
}

/* Større og mer finger-vennlig tidslinje-thumb */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 8px;               /* selve linjen */
  border-radius: 4px;
  background: #ccc;
}

/* iOS / Safari / Chrome */
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 26px;               /* ← størrelse på sirkelen */
  height: 26px;
  border-radius: 50%;
  background: #333;
  border: 2px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  cursor: pointer;
}

/* Firefox */
input[type="range"]::-moz-range-thumb {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #333;
  border: 2px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  cursor: pointer;
}
  /* iPhone/små skjermer: gjør dag-labelene mindre så de ikke overlapper */
  @media (max-width: 430px) {
    .day-label { font-size: 12px; top: 12px; }
    .day-label.first { font-size: 12px; }
    .day-track { height: 26px; }
  }

  </style>

</head>


<body>
  <div id="map"></div>

  <div class="panel">
    <h3>Tidspunkt</h3>
    <div class="small" id="timeLabel">Laster...</div>
    <input id="timeSlider" type="range" min="0" max="0" value="0" step="1">
    <div id="dayTrack" class="day-track"></div>
    <div style="margin-top:8px;">
      <span class="small" id="statusMsg"></span>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
      import { spots } from "./spots.js";
      // --- TEST (fjern når det virker) ---
      const u = spots.find(s => s.name.includes("Utrøna"));
      console.log("TEST Utrøna spot:", u);
      console.log("TEST seaBreeze/alarmText:", u?.seaBreeze, u?.alarmText);
      // -------------------------------

      
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    
      // --- Cache (én gang) ---
      const CACHE_TTL_MS = 30 * 60 * 1000; // 30 minutter
      const CACHE_PREFIX = "omForecast:v2:";
      

      // ---------- Konfig ----------
        const MAX_STEPS = 120; // ca 120 tidssteg i slider
        const TILE_URL = "https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png";
        

    // ---------- UI ----------
    const slider = document.getElementById("timeSlider");
    const timeLabel = document.getElementById("timeLabel");
    const statusMsg = document.getElementById("statusMsg");

    // ---------- Leaflet sjekk ----------
    if (typeof L === "undefined") {
      timeLabel.textContent = "Feil: Leaflet lastet ikke (sjekk nett / CDN).";
      throw new Error("Leaflet not loaded");
    }

    // ---------- Kart ----------
    const map = L.map("map").setView([62.25, 5.6], 9);
    L.tileLayer(TILE_URL, { attribution: "&copy; OpenStreetMap contributors" }).addTo(map);

    const layer = L.layerGroup().addTo(map);

    // Zoom så alle spots vises
    const bounds = L.latLngBounds(spots.map(s => [s.lat, s.lng]));
    if (bounds.isValid()) map.fitBounds(bounds.pad(0.2));

    // ---------- Hjelpefunksjoner ----------
    function normDeg(d) { d = d % 360; return d < 0 ? d + 360 : d; }

    function isInSector(dir, min, max) {
      dir = normDeg(dir); min = normDeg(min); max = normDeg(max);
      if (min <= max) return dir >= min && dir <= max;
      return dir >= min || dir <= max; // krysser 0
    }

    function inRange(x, min, max) { return x >= min && x <= max; }

    // Dine regler:
    // RØD: feil retning eller utenfor min/max styrke
    // GRØNN: innenfor ideal (og retning OK + min/max OK)
    // GUL: ellers
    // SVART hvis over max
        function getStatus(windFromDir, windSpeed, spot) {
        // ✅ 0) Over max vindstyrke => SVART (uansett retning)
        if (Number.isFinite(windSpeed) && Number.isFinite(spot.speedMax) && windSpeed > spot.speedMax) {
          return { color: "black", label: "Over max" };
        }

        // 1) Retning må være OK
        const dirOk = isInSector(windFromDir, spot.dirMin, spot.dirMax);
        if (!dirOk) return { color: "red", label: "Feil retning" };

        // 2) Min/max vindstyrke
        const minMaxOk = inRange(windSpeed, spot.speedMin, spot.speedMax);
        if (!minMaxOk) return { color: "red", label: "Utenfor min/max" };

        // 3) Grønn kun hvis innenfor ideal
        const hasIdeal = Number.isFinite(spot.speedIdealMin) && Number.isFinite(spot.speedIdealMax);
        if (hasIdeal && inRange(windSpeed, spot.speedIdealMin, spot.speedIdealMax)) {
          return { color: "green", label: "Ideal" };
        }

        // 4) Ellers gul
        return { color: "orange", label: "Innenfor min/max" };
      }

    function formatTime(iso) {
      const d = new Date(iso);

      // Ukedag kort på norsk, med punktum (søn.)
      const weekday = d.toLocaleDateString("no-NO", { weekday: "short" });

      // Dato som 26/4 (uten ledende null)
      const day = d.getDate();
      const month = d.getMonth() + 1;

      // Klokke som 12:00 (alltid to siffer på time)
      const hour = String(d.getHours()).padStart(2, "0");
      const time = `${hour}:00`;

      return `${weekday} ${day}/${month} -${time}`;
    }

    function floorToHour(date) {
      const d = new Date(date);
      d.setMinutes(0, 0, 0);
      return d;
    }

    function findNearestTimeKey(mapByTime, targetISO, maxMinutes = 90) {
      // mapByTime: Map(isoTime -> {windFromDir, windSpeed})
      const target = new Date(targetISO).getTime();
      const maxDiff = maxMinutes * 60 * 1000;

      let bestKey = null;
      let bestDiff = Infinity;

      for (const key of mapByTime.keys()) {
        const t = new Date(key).getTime();
        const diff = Math.abs(t - target);
        if (diff < bestDiff) {
          bestDiff = diff;
          bestKey = key;
        }
      }

      if (bestDiff <= maxDiff) return bestKey;
      return null; // for langt unna, da viser vi "mangler data"
    }
      function getNearestAtOrBefore(mapByTime, targetIso) {
        // mapByTime: Map(isoString -> {windFromDir, windSpeed})
        // Returnerer { time, value } for nærmeste tidspunkt <= target, eller null hvis ingen.

        const target = Date.parse(targetIso);
        if (!Number.isFinite(target)) return null;

        // For ytelse: vi itererer keys (fungerer fint for få spots)
        let bestTime = null;
        let bestValue = null;

        for (const [iso, value] of mapByTime.entries()) {
          const t = Date.parse(iso);
          if (!Number.isFinite(t)) continue;

          if (t <= target && (bestTime === null || t > bestTime)) {
            bestTime = t;
            bestValue = value;
          }
        }

        if (bestTime === null) return null;

        return { time: new Date(bestTime).toISOString(), value: bestValue };
      }

    function buildFixedHourlyTimeline(days = 5) {
      const start = floorToHour(new Date());  // nå, rundet til hel time
      const totalHours = days * 24;
      const arr = [];
      for (let i = 0; i < totalHours; i++) {
        const t = new Date(start.getTime() + i * 3600 * 1000);
        arr.push(t.toISOString());
      }
      return arr;
      }

 
function isNightLocal(isoTime) {
  // Lokal tid (din PC/iPhone)
  const h = new Date(isoTime).getHours();
  return (h < 6 || h >= 22); // natt 22–06 (juster om du vil)
}

function symbolToEmoji(code, isoTime) {
  const c = Number(code);
  const night = isoTime ? isNightLocal(isoTime) : false;

  switch (c) {
    // Klart
    case 0: return night ? "🌙" : "☀️";

    // Nesten klart / delvis klart
    case 1:
    case 2: return night ? "🌙" : "🌤️";

    // Skyet
    case 3: return "☁️";

    // Tåke
    case 45:
    case 48: return "🌫️";

    // Yr
    case 51:
    case 53:
    case 55:
    case 56:
    case 57: return "🌦️";

    // Regn / underkjølt regn
    case 61:
    case 63:
    case 65:
    case 66:
    case 67: return "🌧️";

    // Snø
    case 71:
    case 73:
    case 75:
    case 77: return "❄️";

    // Regnbyger
    case 80:
    case 81:
    case 82: return "🌧️";

    // Snøbyger
    case 85:
    case 86: return "❄️";

    // Torden
    case 95:
    case 96:
    case 99: return "⛈️";

    default: return "🌥️";
  }
}


    // SVG vindpil – roterer etter grader
    function windArrowIcon(rotationDeg, color) {
      rotationDeg = normDeg(rotationDeg);
      const svg = `
        <svg width="34" height="34" viewBox="0 0 100 100"
             style="transform: rotate(${rotationDeg}deg); transform-origin: 50% 50%;">
          <polygon points="50,6 72,52 60,52 60,94 40,94 40,52 28,52"
                   fill="${color}" stroke="black" stroke-width="4" />
        </svg>`;
      return L.divIcon({
        className: "wind-arrow-icon",
        html: svg,
        iconSize: [34, 34],
        iconAnchor: [17, 17],
      });
    }

    // ✅ Vindhastighet-label (uten bakgrunn)
    // extraClass kan være f.eks. "gust-high"
    function windSpeedIcon(text, extraClass = "") {
      return L.divIcon({
        className: "wind-speed-icon",
        html: `<div class="wind-speed-label ${extraClass}">${text}</div>`,
        iconSize: [0, 0],
        iconAnchor: [-18, 18]
      });
    }

    // ✅ Vær-symbol til venstre for pil (emoji)
    function weatherIcon(emoji) {
      return L.divIcon({
        className: "weather-icon",
        html: `<div class="weather-badge">${emoji}</div>`,
        iconSize: [0, 0],
        // Plassering: VENSTRE for spot-punktet (juster hvis du vil)
        iconAnchor: [40, 10]
      });
    }

      function alarmIcon(text) {
    return L.divIcon({
      className: "alarm-icon",
      html: `<div class="alarm-badge">${text}</div>`,
      iconSize: [0, 0],
      // litt til venstre (vi finjusterer evt etterpå)
      iconAnchor: [40, 45]
    });
  }

    // ✅ Spot-navn over sirkelen
    function spotNameIcon(name) {
      return L.divIcon({
        className: "spot-name-icon",
        html: `<div class="spot-name-label">${name}</div>`,
        iconSize: [0, 0],
        iconAnchor: [0, 28] // flytter teksten opp (juster ved behov)
      });
    }

    // ---------- Data: forecast per spot ----------
    const forecastsBySpot = {};
    let timeline = [];


function cacheKey(spot) {
  return `${CACHE_PREFIX}${spot.name}:${spot.lat.toFixed(3)},${spot.lng.toFixed(3)}`;
}

function loadCache(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.savedAt || !obj.data) return null;
    if (Date.now() - obj.savedAt > CACHE_TTL_MS) return null;
    return obj.data; // Array of [key,value]
  } catch {
    return null;
  }
}

function saveCache(key, mapByTime) {
  try {
    localStorage.setItem(key, JSON.stringify({
      savedAt: Date.now(),
      data: Array.from(mapByTime.entries())
    }));
  } catch {
    // ignore (storage full etc.)
  }
}

// sleep(ms) har du allerede, ellers:
// function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }


// --- ✅ Komplett erstatning ---
async function fetchForecastForSpot(spot) {
  // 1) Cache først
  const key = cacheKey(spot);
  const cached = loadCache(key);
  if (cached) {
    return new Map(cached);
  }

// 2) Riktig URL (bruk & i JavaScript)
const url =
  "https://api.open-meteo.com/v1/forecast" +
  `?latitude=${spot.lat}` +
  `&longitude=${spot.lng}` +
  "&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m,weathercode" +
  "&timezone=UTC" +
  "&forecast_days=5" +
  "&windspeed_unit=ms";

  // 3) Fetch + retry ved 429
  let r = await fetch(url);

  if (r.status === 429) {
    await sleep(3000);
    r = await fetch(url);
  }

  if (!r.ok) {
    throw new Error(`HTTP ${r.status} for ${spot.name}`);
  }

  const data = await r.json();

  // 4) Parse
  const times = data.hourly.time;
  const speeds = data.hourly.wind_speed_10m;
  const gusts  = data.hourly.wind_gusts_10m;
  const dirs   = data.hourly.wind_direction_10m;
  const codes  = data.hourly.weathercode;

  const mapByTime = new Map();

  for (let i = 0; i < times.length; i++) {
    // Open-Meteo time kommer som "YYYY-MM-DDTHH:MM"
    // Vi normaliserer til ISO (UTC) slik at den matcher resten av koden din.
    mapByTime.set(new Date(times[i]).toISOString(), {
      windSpeed: Number(speeds[i]),
      windGust: Number.isFinite(Number(gusts[i])) ? Number(gusts[i]) : null,
      windFromDir: Number(dirs[i]),
      symbolCode: codes[i] // dette er weathercode (tall)
    });
  }

  // 5) Lagre i cache
  saveCache(key, mapByTime);

  return mapByTime;
}


    function buildTimelineIntersection(maps, maxSteps) {
      const masterTimes = Array.from(maps[0].keys());
      const common = masterTimes.filter(t => maps.every(m => m.has(t)));
      return common.slice(0, maxSteps);
    }


    // Vind fra VEST -> NORD (270° -> 30°), krysser 0°
    const SEA_BREEZE_DIR_MIN = 230;
    const SEA_BREEZE_DIR_MAX = 30;

    // Sol = Open-Meteo weathercode 0..2 (klart / stort sett klart)
    function isSunny(symbolCode) {
      const c = Number(symbolCode);
      return c === 0 || c === 1 || c === 2;

    }

    function isBetweenHoursLocal(isoTime, startHour, endHour) {
      // isoTime er ISO-string (UTC) i timeline/usedTime. new Date(...) gir lokal tid i getHours()
      const h = new Date(isoTime).getHours();
      // Inkluderer 12:00, ekskluderer 20:00 (dvs. 12:00–19:59)
      return h >= startHour && h < endHour;
    }

    // Solgangsbris-regel: kun retning + sol (vindstyrke ignoreres)
    function seaBreezeOverrideOk(spot, windFromDir, symbolCode, isoTime) {
      if (!spot.seaBreeze) return false;
      if (!isSunny(symbolCode)) return false;

      // ✅ Kun mellom kl 12 og 20 (lokal tid)
      if (!isBetweenHoursLocal(isoTime, 12, 20)) return false;

      // ✅ Kun riktig retning (vest/nord-sektor)
      return isInSector(windFromDir, SEA_BREEZE_DIR_MIN, SEA_BREEZE_DIR_MAX);
    }
        
      function renderAtIndex(idx) {
        layer.clearLayers();

        const t = timeline[idx];
        if (!t) {
          timeLabel.textContent = "Ingen tidspunkter";
          return;
        }
        timeLabel.textContent = `${formatTime(t)}`;

        for (const spot of spots) {
          const mapByTime = forecastsBySpot[spot.name];
          if (!mapByTime) continue;

          // Prøv først eksakt tid, ellers fallback til nærmeste før
          let rec = mapByTime.get(t);
          let usedTime = t;

          if (!rec) {
            const nearest = getNearestAtOrBefore(mapByTime, t);
            if (!nearest) continue;
            rec = nearest.value;
            usedTime = nearest.time;
          }

          const windFromDir = rec.windFromDir;
          const windSpeed   = rec.windSpeed;
          const windGust    = rec.windGust;
          const symbolCode  = rec.symbolCode;
          const windTo      = (windFromDir + 180) % 360;

          // Normal status (rød/gul/grønn/svart)
          let status = getStatus(windFromDir, windSpeed, spot);

          // ✅ Solgangsbris: sol + vind fra vest→nord (uansett styrke)
          const seaBreezeOk = seaBreezeOverrideOk(spot, windFromDir, symbolCode, usedTime);
          if (seaBreezeOk) {
            status = { color: "green", label: "Solgangsbris" };
          }

          // Vindkast i parentes
          const gustTxt = Number.isFinite(windGust) ? ` (${Math.round(windGust)})` : "";

          // Alarm kun når solgangsbris er aktiv og spot har alarmText
          const alarmLine =
            (seaBreezeOk && spot.alarmText)
              ? `<div style="color:#d00000;font-weight:900;">${spot.alarmText}</div>`
              : "";

          // Sirkel
          const circle = L.circleMarker([spot.lat, spot.lng], {
            color: status.color,
            radius: 10,
            weight: 3,
            fillOpacity: 0.20
          }).addTo(layer);

          circle.bindPopup(
            alarmLine +
            `<b>${spot.name}</b><br>` +
            `Tid: ${formatTime(usedTime)}<br>` +
            `Vind fra: ${Math.round(windFromDir)}°<br>` +
            `Vind til: ${Math.round(windTo)}°<br>` +
            `Styrke: ${windSpeed.toFixed(1)}${gustTxt} m/s<br>` +
            `Status: ${status.label}`
          );

          // Spot-navn
          L.marker([spot.lat, spot.lng], {
            icon: spotNameIcon(spot.name),
            interactive: false,
            zIndexOffset: 1300
          }).addTo(layer);

          // Vær-emoji
          const emoji = symbolToEmoji(symbolCode);

          // ✅ Alarmtekst til venstre for værsymbolet når solgangsbris trigges
          if (seaBreezeOk && spot.alarmText) {
            L.marker([spot.lat, spot.lng], {
              icon: alarmIcon(spot.alarmText),
              interactive: false,
              zIndexOffset: 1185
            }).addTo(layer);
          }

          // Værikon
          L.marker([spot.lat, spot.lng], {
            icon: weatherIcon(emoji),
            interactive: false,
            zIndexOffset: 1190
          }).addTo(layer);

          // Vindpil (samme farge som status – blir grønn ved solgangsbris)
          L.marker([spot.lat, spot.lng], {
            icon: windArrowIcon(windTo, status.color),
            interactive: false,
            zIndexOffset: 1200
          }).addTo(layer);

          // Vindtekst
          L.marker([spot.lat, spot.lng], {
            icon: windSpeedIcon(`${windSpeed.toFixed(1)}${gustTxt} m/s`),
            interactive: false,
            zIndexOffset: 1250
          }).addTo(layer);
        }
      }


      async function mapWithConcurrency(items, limit, mapper) {
        const results = new Array(items.length);
        let nextIndex = 0;

        async function worker() {
          while (true) {
            const i = nextIndex++;
            if (i >= items.length) return;
            results[i] = await mapper(items[i], i);
          }
        }

        const workers = [];
        for (let i = 0; i < Math.min(limit, items.length); i++) {
          workers.push(worker());
        }

        await Promise.all(workers);
        return results;
      }


    async function loadAll() {
      statusMsg.textContent = "Laster...";
      timeLabel.textContent = "Henter varsler...";
      layer.clearLayers();

      
      const CONCURRENCY = 3; // prøv 3, hvis du får 429 igjen: sett til 2
      const maps = await mapWithConcurrency(spots, CONCURRENCY, (spot) => fetchForecastForSpot(spot));

      
 
      spots.forEach((spot, i) => { forecastsBySpot[spot.name] = maps[i]; });

      timeline = buildFixedHourlyTimeline(5); // 5 dager * 24 timer = 120 steg
     function buildDaySeparators(timeline) {
      const dayTrack = document.getElementById("dayTrack");
      if (!dayTrack) return;

      dayTrack.innerHTML = "";
      if (!timeline || timeline.length < 2) return;

      // Vi bruker timeline som "sannhet" og finner posisjon i %
      // ved å mappe en dato/tid til nærmeste index i timeline.
      const maxIndex = timeline.length - 1;

      // Helper: finn index i timeline for et gitt tidspunkt (ms)
      function findIndexForTimeMs(targetMs) {
        // timeline er sortert time-for-time, så lineær søk er ok (120 elementer)
        let bestI = 0;
        let bestDiff = Infinity;
        for (let i = 0; i < timeline.length; i++) {
          const tMs = Date.parse(timeline[i]);
          const diff = Math.abs(tMs - targetMs);
          if (diff < bestDiff) { bestDiff = diff; bestI = i; }
    }
    return bestI;
  }

  // Label-format (dato)
  const fmtDate = (d) =>
    d.toLocaleDateString("no-NO", { weekday: "short", day: "2-digit", month: "2-digit" });

  // Start og slutt basert på timeline
  const startMs = Date.parse(timeline[0]);
  const endMs   = Date.parse(timeline[maxIndex]);

  // Finn første lokale midnatt (00:00) ETTER eller LIK timeline-start
  const startDate = new Date(startMs);
  const firstMidnight = new Date(startDate);
  firstMidnight.setHours(0, 0, 0, 0);

  // hvis timeline starter etter midnatt samme dag, gå til neste midnatt
  if (firstMidnight.getTime() < startMs) {
    firstMidnight.setDate(firstMidnight.getDate() + 1);
  }

  // Lag ticks for hver midnatt innenfor tidsvinduet
  let d = firstMidnight;
  let isFirst = true;

  while (d.getTime() <= endMs) {
    const idx = findIndexForTimeMs(d.getTime());
    const leftPct = (idx / maxIndex) * 100;

    const tick = document.createElement("div");
    tick.className = "day-tick" + (isFirst ? " first" : "");
    tick.style.left = leftPct + "%";
    dayTrack.appendChild(tick);

    const label = document.createElement("div");
    label.className = "day-label" + (isFirst ? " first" : "");
    label.style.left = leftPct + "%";
    label.textContent = fmtDate(d);
    dayTrack.appendChild(label);

    // neste døgn (lokal tid)
    d = new Date(d);
    d.setDate(d.getDate() + 1);
    isFirst = false;
  }
}

      slider.min = 0;
      slider.max = timeline.length - 1;
      slider.value = 0;

      // bygg dagskille-linje
      buildDaySeparators(timeline);

      renderAtIndex(0);

      statusMsg.textContent = "";
    }

    // Events
    slider.addEventListener("input", () => renderAtIndex(parseInt(slider.value, 10)));
   
    // Start
    loadAll().catch(err => {
      console.error(err);
      statusMsg.textContent = "Feil";
      timeLabel.textContent = "Kunne ikke laste data. Se Console (F12).";
    });
  </script>
